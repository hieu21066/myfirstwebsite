<!DOCTYPE html>
<html lang="en">
<head>
    <title>Page2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <h1>This is page 2</h1>  
 <br>
  <form>
    <div>
      <label for="fname">First name</label>
      <input type="text" id="fname" name="fname" placeholder="Spongebob" required>
    </div>
    <br>
    <div>
    <label for="lname">Last name</label>
    <input type="text" id="lname" name="lname" placeholder="Sparepants" required>
    </div>
     <br>
     <div>
        <label for="pass">Password:</label>
        <input type="password" id="pass" name="pass" maxlengh="8" required >
     </div>
     <br>
     <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="abc@gmail.com" required >
     </div>
     <br>
     <div>
        <label for="phone">Phone number:</label>
        <input type="tel" id="phone" name="phone" placeholder="(123)-456-7890" required >
     </div>
     <br>
     <div>
        <label for="bdate">Birthdate:</label>
        <input type="date" id="bdate" name="bdate"  required >
     </div>
     <br>
    <div>
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="0" max="99" value="0" required >
     </div>
     <br>
    <div>
        <label for="title">Title:</label>

        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." name="title" value="Mr.">

        <label for="Mrs.">Mrs.</label>
        <input type="radio" id="Mrs." name="title" value="Mrs.">

    </div>
    <br>
    <div>
        <label for="payment">Payment:</label>
        <select id="payment" name="payment">
            <option value="visa">Visa</option>
            <option value="card">Card</option>
            <option value="giftcard">Giftcard</option>
        </select>
    </div>
    <br>
    <div>
        <label for="vietnamese">Vietnamese:</label>
        <input type="checkbox" id="vietnamese" name="vietnamese">
    </div>
    <br>
    <div>
        <input type="reset">
    </div>
    <br>
    <div>
        <input type="submit">
    </div>
</form>
</body>
</html>
